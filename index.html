<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeFit · full body</title>
  <!-- Font Awesome 6 for icons + tsParticles confetti -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.4.0/tsparticles.confetti.bundle.min.js"></script>
  <style>
    /* ---------- EXACT SCREENSHOT VISUALS ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      color: #000000;
    }

    .workout-card {
      max-width: 560px;
      width: 100%;
      background: #ffffff;
      padding: 20px 20px 28px 20px;
    }

    .workout-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .brand-icon {
      background: transparent;
      font-size: 30px;
      line-height: 1;
      color: #000000;
    }

    .brand-text h2 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #000000;
    }

    .brand-text p {
      font-size: 0.75rem;
      color: #6d6d6d;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 2px;
    }

    .video-placeholder {
      background-color: #eaeef3;
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a4a4a;
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-radius: 5%;
    }

    .phase-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 8px;
    }

    .phase-tab {
      background: transparent;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: #5e5e5e;
      padding: 4px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.1s;
    }

    .phase-tab.active {
      color: #000000;
      border-bottom: 2px solid #000000;
      font-weight: 600;
    }

    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .day-switcher {
      display: flex;
      gap: 15px;
    }

    .day-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      color: #5e5e5e;
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
    }

    .day-btn.active {
      color: #000000;
      border-bottom: 2px solid #000000;
      font-weight: 600;
    }

    .repeat-btn {
      background: #f0f2f5;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #1e2b3a;
      font-size: 1.2rem;
      transition: all 0.15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .repeat-btn:hover {
      background: #e2e6ec;
      transform: scale(1.03);
      color: #000000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Last completed tracker */
    .last-completed {
      background: #f8f9fa;
      border: 1px solid #eaeef3;
      border-radius: 40px;
      padding: 10px 16px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      color: #2e4b6b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .last-completed i {
      color: #4CAF50;
      font-size: 1.1rem;
    }
    
    .last-completed span {
      font-weight: 600;
      color: #000000;
    }

    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }

    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .exercise-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .exercise-name {
      font-weight: 500;
      color: #000000;
      font-size: 1rem;
    }

    .exercise-sets {
      font-size: 0.85rem;
      color: #5e5e5e;
      background: transparent;
      padding: 0;
      font-weight: 400;
    }

    .play-button {
      background: #f0f2f5;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #1e2b3a;
      font-size: 1.2rem;
      transition: all 0.15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .play-button i {
      margin-left: 2px;
    }

    .play-button:hover {
      background: #e2e6ec;
      transform: scale(1.03);
      color: #000000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .exercise-row.clicked .play-button {
      background: #d0e0ff;
      color: #004e9e;
      border: 1px solid #a0c0ff;
    }

    .completed-btn {
      background-color: #000000;
      color: #ffffff;
      border: none;
      width: 60%;
      display: block;
      margin: 0 auto;
      padding: 18px 0;
      font-size: 1.3rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      border-radius: 5%;
      text-transform: none;
      transition: background-color 0.15s, transform 0.1s;
    }

    .completed-btn:active {
      transform: scale(0.97);
    }

    .completed-btn:hover {
      background-color: #222222;
    }

    .video-embed-container {
      background-color: #eaeef3;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 24px;
      display: none;
      border-radius: 5%;
    }

    .video-embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 5%;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="workout-card">
    <div class="workout-header">
      <div class="brand-icon">🏠</div>
      <div class="brand-text">
        <h2>HomeFit</h2>
        <p>Full body program · 3 days/week</p>
      </div>
    </div>

    <div class="video-placeholder" id="mainVideoPlaceholder">
      DISPLAY VIDEO HERE
    </div>
    <div id="videoEmbedContainer" class="video-embed-container">
      <iframe id="videoIframe" src="" allowfullscreen></iframe>
    </div>

    <!-- LAST COMPLETED TRACKER -->
    <div class="last-completed" id="lastCompletedTracker">
      <i class="fas fa-calendar-check"></i>
      <div>Last completed: <span id="lastCompletedDate">Not yet completed</span></div>
    </div>

    <div class="phase-tabs" id="phaseTabs">
      <button class="phase-tab active" data-phase="foundation">Foundation</button>
      <button class="phase-tab" data-phase="strength">Strength</button>
      <button class="phase-tab" data-phase="hypertrophy">Hypertrophy</button>
    </div>

    <div class="day-row">
      <div class="day-switcher" id="daySwitcher">
        <button class="day-btn active" data-day="A">Day A</button>
        <button class="day-btn" data-day="B">Day B</button>
        <button class="day-btn" data-day="C">Day C</button>
      </div>
      <button class="repeat-btn" id="repeatBtn" title="Repeat current phase"><i class="fas fa-undo-alt"></i></button>
    </div>

    <div class="exercise-list" id="exerciseList"></div>

    <button class="completed-btn" id="completedBtn">Completed</button>
  </div>

  <script>
    (function() {
      // ---------- WORKING VIDEO LINKS - FIXED WITH EXACT MATCHES ----------
      const exerciseVideos = {
        // Foundation / Day A exercises
        "Goblet Squat": "https://www.youtube.com/embed/UsRx7HcJhZA",
        "Dumbbell Floor Press": "https://www.youtube.com/embed/cgPq2iA4hrg",
        "Resistance Band Row": "https://www.youtube.com/embed/9Q4pUwF66-w",
        "Dumbbell Romanian Deadlift": "https://www.youtube.com/embed/_T3Lg38AK3Q",
        "Dumbbell Shoulder Press": "https://www.youtube.com/embed/qE1K2eWlfrk",
        "Plank": "https://www.youtube.com/embed/2UyhqHmZApQ",
        
        // Day B exercises
        "Reverse Lunges": "https://www.youtube.com/embed/rJcnjJ4h1gQ",
        "Push-ups": "https://www.youtube.com/embed/_l3ySVKYVJ8",
        "One-Arm Dumbbell Row": "https://www.youtube.com/embed/UEpS7cF2Z4A",
        "Glute Bridge": "https://www.youtube.com/embed/FsVlM8Fzpk8",
        "Dumbbell Biceps Curl": "https://www.youtube.com/embed/av7-8igSXTs",
        "Dead Bug": "https://www.youtube.com/embed/WJzGkwZ4eHc",
        
        // Day C exercises
        "Dumbbell Deadlift": "https://www.youtube.com/embed/5TlH2VzXwKQ",
        "Resistance Band Chest Press": "https://www.youtube.com/embed/lB6QQJ7a7qE",
        "Band Lat Pulldown": "https://www.youtube.com/embed/l8GfNc5923s",
        "Dumbbell Lateral Raise": "https://www.youtube.com/embed/3VcKaXpzqRo",
        "Triceps Kickbacks": "https://www.youtube.com/embed/hjwH1pYyKYU",
        "Russian Twist": "https://www.youtube.com/embed/wkD8rjkodUI",
        
        // STRENGTH PHASE - exact matches
        "Dumbbell Press": "https://www.youtube.com/embed/cgPq2iA4hrg",  // For Strength Day A
        "Band Row": "https://www.youtube.com/embed/9Q4pUwF66-w",        // For Strength Day A
        "Shoulder Press": "https://www.youtube.com/embed/qE1K2eWlfrk",  // For Strength Day A
        "One-Arm Row": "https://www.youtube.com/embed/UEpS7cF2Z4A",     // For Strength Day B
        "Dumbbell Curl": "https://www.youtube.com/embed/av7-8igSXTs",   // For Strength Day B
        "Lateral Raise": "https://www.youtube.com/embed/3VcKaXpzqRo",   // For Strength Day C
        "Triceps Kickback": "https://www.youtube.com/embed/hjwH1pYyKYU", // For Strength Day C
        "Band Chest Press": "https://www.youtube.com/embed/lB6QQJ7a7qE", // For Strength Day C
        
        // HYPERTROPHY PHASE - ADDED THESE SPECIFICALLY
        // Superset 1 exercises
        "Dumbbell Press (Superset 1)": "https://www.youtube.com/embed/cgPq2iA4hrg",
        "Goblet Squat (Superset 1)": "https://www.youtube.com/embed/UsRx7HcJhZA",
        
        // Superset 2 exercises
        "Band Row (Superset 2)": "https://www.youtube.com/embed/9Q4pUwF66-w",
        "Dumbbell Romanian Deadlift (Superset 2)": "https://www.youtube.com/embed/_T3Lg38AK3Q",
        
        // Also add the base names as fallback
        "Goblet Squat": "https://www.youtube.com/embed/UsRx7HcJhZA",
        "Dumbbell Press": "https://www.youtube.com/embed/cgPq2iA4hrg",
        "Band Row": "https://www.youtube.com/embed/9Q4pUwF66-w",
        "Dumbbell Romanian Deadlift": "https://www.youtube.com/embed/_T3Lg38AK3Q"
      };

      // ---------- FULL PROGRAM ----------
      const program = {
        foundation: {
          name: "Foundation",
          A: [
            { name: "Goblet Squat", sets: "3", reps: "10–12" },
            { name: "Dumbbell Floor Press", sets: "3", reps: "10–12" },
            { name: "Resistance Band Row", sets: "3", reps: "10–12" },
            { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10–12" },
            { name: "Dumbbell Shoulder Press", sets: "3", reps: "10–12" },
            { name: "Plank", sets: "3", reps: "20–30 sec" }
          ],
          B: [
            { name: "Reverse Lunges", sets: "3", reps: "10–12 / leg" },
            { name: "Push-ups", sets: "3", reps: "10–12" },
            { name: "One-Arm Dumbbell Row", sets: "3", reps: "10–12 / side" },
            { name: "Glute Bridge", sets: "3", reps: "10–12" },
            { name: "Dumbbell Biceps Curl", sets: "3", reps: "10–12" },
            { name: "Dead Bug", sets: "3", reps: "10 / side" }
          ],
          C: [
            { name: "Dumbbell Deadlift", sets: "3", reps: "10–12" },
            { name: "Resistance Band Chest Press", sets: "3", reps: "10–12" },
            { name: "Band Lat Pulldown", sets: "3", reps: "10–12" },
            { name: "Dumbbell Lateral Raise", sets: "3", reps: "10–12" },
            { name: "Triceps Kickbacks", sets: "3", reps: "10–12" },
            { name: "Russian Twist", sets: "3", reps: "20" }
          ]
        },
        strength: {
          name: "Strength",
          A: [
            { name: "Goblet Squat", sets: "4", reps: "8" },
            { name: "Dumbbell Press", sets: "4", reps: "8" },
            { name: "Band Row", sets: "4", reps: "10" },
            { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10" },
            { name: "Shoulder Press", sets: "3", reps: "8" },
            { name: "Plank", sets: "3", reps: "30 sec" }
          ],
          B: [
            { name: "Reverse Lunges", sets: "4", reps: "8 / leg" },
            { name: "Push-ups", sets: "4", reps: "10" },
            { name: "One-Arm Row", sets: "3", reps: "10 / side" },
            { name: "Glute Bridge", sets: "3", reps: "12" },
            { name: "Dumbbell Curl", sets: "3", reps: "10" },
            { name: "Dead Bug", sets: "3", reps: "12 / side" }
          ],
          C: [
            { name: "Dumbbell Deadlift", sets: "4", reps: "8" },
            { name: "Band Chest Press", sets: "3", reps: "10" },
            { name: "Band Lat Pulldown", sets: "3", reps: "10" },
            { name: "Lateral Raise", sets: "3", reps: "12" },
            { name: "Triceps Kickback", sets: "3", reps: "10" },
            { name: "Russian Twist", sets: "3", reps: "20" }
          ]
        },
        hypertrophy: {
          name: "Hypertrophy",
          A: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Goblet Squat (Superset 1)", sets: "4", reps: "8" },
                { name: "Dumbbell Press (Superset 1)", sets: "4", reps: "8" }
              ]},
              { label: "Superset 2", exercises: [
                { name: "Band Row (Superset 2)", sets: "4", reps: "10" },
                { name: "Dumbbell Romanian Deadlift (Superset 2)", sets: "4", reps: "10" }
              ]}
            ],
            singles: [
              { name: "Shoulder Press", sets: "3", reps: "10" },
              { name: "Plank", sets: "3", reps: "40 sec" }
            ]
          },
          B: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Reverse Lunges (Superset 1)", sets: "4", reps: "8 / leg" },
                { name: "Push-ups (Superset 1)", sets: "4", reps: "12" }
              ]}
            ],
            singles: [
              { name: "One-Arm Row", sets: "4", reps: "10 / side" },
              { name: "Glute Bridge", sets: "4", reps: "12" },
              { name: "Dumbbell Curl", sets: "3", reps: "10" }
            ]
          },
          C: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Dumbbell Deadlift (Superset 1)", sets: "4", reps: "8" },
                { name: "Band Chest Press (Superset 1)", sets: "4", reps: "10" }
              ]}
            ],
            singles: [
              { name: "Band Lat Pulldown", sets: "4", reps: "10" },
              { name: "Lateral Raise", sets: "3", reps: "12" },
              { name: "Triceps Kickback", sets: "3", reps: "10" },
              { name: "Russian Twist", sets: "3", reps: "25" }
            ]
          }
        }
      };

      // UI elements
      const phaseTabs = document.querySelectorAll('.phase-tab');
      const dayBtns = document.querySelectorAll('.day-btn');
      const repeatBtn = document.getElementById('repeatBtn');
      const exerciseListEl = document.getElementById('exerciseList');
      const videoPlaceholder = document.getElementById('mainVideoPlaceholder');
      const videoEmbed = document.getElementById('videoEmbedContainer');
      const videoIframe = document.getElementById('videoIframe');
      const completedBtn = document.getElementById('completedBtn');
      const lastCompletedSpan = document.getElementById('lastCompletedDate');

      let currentPhase = 'foundation';
      let currentDay = 'A';
      let clickedExercises = new Set();

      function updateLastCompletedDisplay() {
        const key = `lastCompleted_${currentPhase}_${currentDay}`;
        const saved = localStorage.getItem(key);
        if (saved) {
          lastCompletedSpan.textContent = saved;
        } else {
          lastCompletedSpan.textContent = 'Not yet completed';
        }
      }

      function triggerCelebration() {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCB77', '#9B59B6']
        });
        
        setTimeout(() => {
          confetti({
            particleCount: 50,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: ['#FF8C42', '#FFE66D', '#4ECDC4']
          });
          confetti({
            particleCount: 50,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: ['#FF8C42', '#FFE66D', '#4ECDC4']
          });
        }, 150);
        
        const now = new Date();
        const formatted = now.toLocaleDateString('en-US', { 
          weekday: 'short', 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
        
        const key = `lastCompleted_${currentPhase}_${currentDay}`;
        localStorage.setItem(key, formatted);
        updateLastCompletedDisplay();
      }

      function formatSetsReps(ex) {
        return `${ex.sets} sets x ${ex.reps}`;
      }

      function renderExercises() {
        const phaseData = program[currentPhase];
        const dayData = phaseData[currentDay];

        let htmlStr = '';

        if (currentPhase !== 'hypertrophy') {
          dayData.forEach((ex, idx) => {
            const rowId = `row-${currentPhase}-${currentDay}-${idx}`;
            htmlStr += `
              <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}" data-index="${idx}">
                <div class="exercise-info">
                  <span class="exercise-name">${ex.name}</span>
                  <span class="exercise-sets">${formatSetsReps(ex)}</span>
                </div>
                <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}">
                  <i class="fas fa-play"></i>
                </button>
              </div>
            `;
          });
        } else {
          // Handle hypertrophy with supersets
          if (dayData.supersets) {
            dayData.supersets.forEach((group, groupIdx) => {
              group.exercises.forEach((ex, exIdx) => {
                const rowId = `row-${currentPhase}-${currentDay}-hyper-${groupIdx}-${exIdx}`;
                htmlStr += `
                  <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}" data-index="hyper-${groupIdx}-${exIdx}">
                    <div class="exercise-info">
                      <span class="exercise-name">${ex.name}</span>
                      <span class="exercise-sets">${formatSetsReps(ex)}</span>
                    </div>
                    <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}">
                      <i class="fas fa-play"></i>
                    </button>
                  </div>
                `;
              });
            });
          }
          if (dayData.singles) {
            dayData.singles.forEach((ex, idx) => {
              const rowId = `row-${currentPhase}-${currentDay}-single-${idx}`;
              htmlStr += `
                <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}" data-index="single-${idx}">
                  <div class="exercise-info">
                    <span class="exercise-name">${ex.name}</span>
                    <span class="exercise-sets">${formatSetsReps(ex)}</span>
                  </div>
                  <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}">
                    <i class="fas fa-play"></i>
                  </button>
                </div>
              `;
            });
          }
        }

        exerciseListEl.innerHTML = htmlStr;
        clickedExercises.clear();
        updateLastCompletedDisplay();

        document.querySelectorAll('.play-button').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const exName = btn.dataset.exercise;
            const rowId = btn.dataset.row;
            
            // Try to get video URL - first with exact name, then try base name
            let url = exerciseVideos[exName];
            
            // If no exact match, try to extract base name (remove Superset X)
            if (!url && exName.includes('(')) {
              const baseName = exName.split('(')[0].trim();
              url = exerciseVideos[baseName];
              console.log(`Trying base name: ${baseName} for ${exName}`);
            }
            
            const row = document.querySelector(`[data-row-id="${rowId}"]`);
            if (row) {
              row.classList.add('clicked');
              clickedExercises.add(rowId);
            }

            if (url) {
              videoPlaceholder.style.display = 'none';
              videoEmbed.style.display = 'block';
              videoIframe.src = url;
            } else {
              alert(`Video not available for ${exName}`);
              console.log('Missing video for:', exName);
            }
          });
        });
      }

      phaseTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          phaseTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentPhase = tab.dataset.phase;
          currentDay = 'A';
          dayBtns.forEach(b => b.classList.remove('active'));
          dayBtns[0].classList.add('active');
          renderExercises();
        });
      });

      dayBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          dayBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDay = btn.dataset.day;
          renderExercises();
        });
      });

      repeatBtn.addEventListener('click', () => {
        currentDay = 'A';
        dayBtns.forEach(b => b.classList.remove('active'));
        dayBtns[0].classList.add('active');
        renderExercises();
        videoPlaceholder.style.display = 'flex';
        videoEmbed.style.display = 'none';
        videoIframe.src = '';
      });

      completedBtn.addEventListener('click', () => {
        const totalExercises = document.querySelectorAll('.exercise-row').length;
        
        if (clickedExercises.size === totalExercises && totalExercises > 0) {
          triggerCelebration();
          
          videoPlaceholder.style.display = 'flex';
          videoEmbed.style.display = 'none';
          videoIframe.src = '';

          const days = ['A', 'B', 'C'];
          let currentDayIndex = days.indexOf(currentDay);
          let nextDayIndex = (currentDayIndex + 1) % days.length;
          
          if (nextDayIndex === 0) {
            const phases = ['foundation', 'strength', 'hypertrophy'];
            let currentPhaseIndex = phases.indexOf(currentPhase);
            let nextPhaseIndex = (currentPhaseIndex + 1) % phases.length;
            
            phaseTabs.forEach(t => t.classList.remove('active'));
            phaseTabs[nextPhaseIndex].classList.add('active');
            currentPhase = phases[nextPhaseIndex];
          }
          
          dayBtns.forEach(b => b.classList.remove('active'));
          dayBtns[nextDayIndex].classList.add('active');
          currentDay = days[nextDayIndex];
          
          renderExercises();
        } else {
          videoPlaceholder.style.display = 'flex';
          videoEmbed.style.display = 'none';
          videoIframe.src = '';
          
          completedBtn.style.backgroundColor = '#222';
          setTimeout(() => completedBtn.style.backgroundColor = '#000', 150);
          alert(`Please click the play button on each exercise before completing the workout. (${clickedExercises.size}/${totalExercises} completed)`);
        }
      });

      videoPlaceholder.addEventListener('click', () => {
        videoPlaceholder.style.display = 'flex';
        videoEmbed.style.display = 'none';
        videoIframe.src = '';
      });

      renderExercises();
    })();
  </script>
</body>
</html>
