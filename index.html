<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeFit · full body</title>
  <!-- Font Awesome 6 for icons + tsParticles confetti -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.4.0/tsparticles.confetti.bundle.min.js"></script>
  <style>
    /* ===== TWO-COLOR SYSTEM – NO BORDERS, ALL RADIUS ≤ 2% ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Dark mode (default) */
      --bg-primary: #151719;
      --bg-secondary: #1a1e24;
      --bg-tertiary: #2d333b;
      --text-primary: #e4e6eb;
      --text-secondary: #9aa1b0;
      --text-muted: #6b7280;
      --border-color: transparent;
      --accent-color: #e4e6eb;
      --accent-hover: #ffffff;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
      --button-text: #0a0c10;
      --card-bg: transparent;
      --placeholder-bg: #2d333b;
      --play-btn-bg: #2d333b;
      --play-btn-color: #e4e6eb;
      --completed-btn-bg: #e4e6eb;
      --completed-btn-text: #0a0c10;
    }

    body.light-mode {
      --bg-primary: #f5f7fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e9eef3;
      --text-primary: #1a1e24;
      --text-secondary: #4a5568;
      --text-muted: #64748b;
      --border-color: transparent;
      --accent-color: #4a5568;
      --accent-hover: #1a1e24;
      --shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
      --button-text: #ffffff;
      --card-bg: transparent;
      --placeholder-bg: #e9eef3;
      --play-btn-bg: #e9eef3;
      --play-btn-color: #1a1e24;
      --completed-btn-bg: #1a1e24;
      --completed-btn-text: #ffffff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* MAIN CARD – NO BACKGROUND, WIDER */
    .workout-card {
      max-width: 900px;
      width: 100%;
      padding: 32px 32px 40px 32px;
    }

    /* header */
    .workout-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-icon {
      background: transparent;
      font-size: 36px;
      line-height: 1;
      color: var(--text-primary);
    }

    .brand-text h2 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }

    .brand-text p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 4px;
    }

    /* video placeholder – 2% radius */
    .video-placeholder {
      background-color: var(--placeholder-bg);
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-radius: 2%;                    /* ≤ 2% */
      border: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* phase tabs */
    .phase-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      border-bottom: 1px solid transparent;
      padding-bottom: 10px;
    }

    .phase-tab {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.1s;
    }

    .phase-tab:hover {
      color: var(--accent-hover);
    }

    .phase-tab.active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent-hover);
      font-weight: 600;
    }

    /* day row */
    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .day-switcher {
      display: flex;
      gap: 20px;
    }

    .day-btn {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: 0.1s;
    }

    .day-btn:hover {
      color: var(--accent-hover);
    }

    .day-btn.active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent-hover);
      font-weight: 600;
    }

    /* repeat button – circular (50% radius, not changed) */
    .repeat-btn {
      background: var(--play-btn-bg);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;                   /* keep circular */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--play-btn-color);
      font-size: 1.3rem;
      transition: all 0.15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .repeat-btn:hover {
      background: var(--bg-tertiary);
      transform: scale(1.03);
      color: var(--accent-hover);
    }

    /* Last completed tracker – 2% radius */
    .last-completed {
      background: var(--bg-tertiary);
      border: none;
      border-radius: 2%;                    /* ≤ 2% */
      padding: 14px 20px;
      margin-bottom: 24px;
      font-size: 1rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .last-completed i {
      color: #4CAF50;
      font-size: 1.2rem;
    }
    
    .last-completed span {
      font-weight: 600;
      color: var(--text-primary);
    }

    /* exercise list */
    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .exercise-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .exercise-name {
      font-weight: 500;
      color: var(--text-primary);
      font-size: 1.05rem;
    }

    .exercise-sets {
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: transparent;
      padding: 0;
      font-weight: 400;
    }

    /* play button – circular (50% radius) */
    .play-button {
      background: var(--play-btn-bg);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;                   /* keep circular */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--play-btn-color);
      font-size: 1.3rem;
      transition: all 0.15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .play-button i {
      margin-left: 2px;
    }

    .play-button:hover {
      background: var(--bg-tertiary);
      transform: scale(1.03);
      color: var(--accent-hover);
    }

    .exercise-row.clicked .play-button {
      background: #2d4b6e;
      color: #ffffff;
    }

    /* completed button – 2% radius */
    .completed-btn {
      background-color: var(--completed-btn-bg);
      color: var(--completed-btn-text);
      border: none;
      width: 70%;
      display: block;
      margin: 0 auto;
      padding: 20px 0;
      font-size: 1.4rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 16px;
      border-radius: 2%;                    /* ≤ 2% */
      text-transform: none;
      transition: background-color 0.15s, transform 0.1s;
    }

    .completed-btn:active {
      transform: scale(0.97);
    }

    .completed-btn:hover {
      background-color: var(--accent-hover);
      color: var(--bg-primary);
    }

    /* video embed container – 2% radius */
    .video-embed-container {
      background-color: var(--placeholder-bg);
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 32px;
      display: none;
      border-radius: 2%;                    /* ≤ 2% */
    }

    .video-embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 2%;                    /* ≤ 2% */
    }

    /* Theme toggle button – circular (50% radius) */
    .theme-toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      padding: 0.25rem;
      border-radius: 50%;                   /* keep circular */
      width: 48px;
      height: 48px;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .theme-toggle:hover {
      background-color: var(--bg-secondary);
      color: var(--accent-hover);
    }

    .hidden {
      display: none !important;
    }

    /* responsive adjustments */
    @media (max-width: 600px) {
      body {
        padding: 16px;
      }
      
      .workout-card {
        padding: 24px 20px 32px 20px;
      }
      
      .brand-text h2 {
        font-size: 1.8rem;
      }
      
      .phase-tab {
        font-size: 0.9rem;
      }
      
      .day-btn {
        font-size: 1rem;
      }
      
      .exercise-name {
        font-size: 1rem;
      }
      
      .completed-btn {
        width: 85%;
        padding: 16px 0;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="workout-card">
    <!-- Theme toggle -->
    <div class="theme-toggle-wrapper">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="fas fa-moon" id="darkIcon"></i>
        <i class="fas fa-sun" id="lightIcon" style="display: none;"></i>
      </button>
    </div>

    <!-- header -->
    <div class="workout-header">
      <div class="brand-icon">🏠</div>
      <div class="brand-text">
        <h2>HomeFit</h2>
        <p>Full body program · 3 days/week</p>
      </div>
    </div>

    <!-- video area -->
    <div class="video-placeholder" id="mainVideoPlaceholder">
      DISPLAY VIDEO HERE
    </div>
    <div id="videoEmbedContainer" class="video-embed-container">
      <iframe id="videoIframe" src="" allowfullscreen></iframe>
    </div>

    <!-- LAST COMPLETED TRACKER -->
    <div class="last-completed" id="lastCompletedTracker">
      <i class="fas fa-calendar-check"></i>
      <div>Last completed: <span id="lastCompletedDate">Not yet completed</span></div>
    </div>

    <!-- phase tabs -->
    <div class="phase-tabs" id="phaseTabs">
      <button class="phase-tab active" data-phase="foundation">Foundation</button>
      <button class="phase-tab" data-phase="strength">Strength</button>
      <button class="phase-tab" data-phase="hypertrophy">Hypertrophy</button>
    </div>

    <!-- day switcher + repeat -->
    <div class="day-row">
      <div class="day-switcher" id="daySwitcher">
        <button class="day-btn active" data-day="A">Day A</button>
        <button class="day-btn" data-day="B">Day B</button>
        <button class="day-btn" data-day="C">Day C</button>
      </div>
      <button class="repeat-btn" id="repeatBtn" title="Repeat current phase"><i class="fas fa-undo-alt"></i></button>
    </div>

    <!-- exercise container -->
    <div class="exercise-list" id="exerciseList"></div>

    <!-- completed button -->
    <button class="completed-btn" id="completedBtn">Completed</button>
  </div>

  <script>
    (function() {
      // ---------- WORKING VIDEO LINKS ----------
      const exerciseVideos = {

        "Dumbbell Press": "https://www.youtube.com/embed/cgPq2iA4hrg",
        "Band Row": "https://www.youtube.com/embed/9Q4pUwF66-w",
        "Shoulder Press": "https://www.youtube.com/embed/qE1K2eWlfrk",
        "One-Arm Row": "https://www.youtube.com/embed/UEpS7cF2Z4A",
        "Dumbbell Curl": "https://www.youtube.com/embed/av7-8igSXTs",
        "Lateral Raise": "https://www.youtube.com/embed/3VcKaXpzqRo",
        "Triceps Kickback": "https://www.youtube.com/embed/hjwH1pYyKYU",
        "Band Chest Press": "https://www.youtube.com/embed/lB6QQJ7a7qE",
        "Goblet Squat (Superset 1)": "https://www.youtube.com/embed/UsRx7HcJhZA",
        "Dumbbell Press (Superset 1)": "https://www.youtube.com/embed/cgPq2iA4hrg",
        "Band Row (Superset 2)": "https://www.youtube.com/embed/9Q4pUwF66-w",
        "Dumbbell Romanian Deadlift (Superset 2)": "https://www.youtube.com/embed/_T3Lg38AK3Q",
        "Reverse Lunges (Superset 1)": "https://www.youtube.com/embed/rJcnjJ4h1gQ",
        "Push-ups (Superset 1)": "https://www.youtube.com/embed/_l3ySVKYVJ8",
        "Dumbbell Deadlift (Superset 1)": "https://www.youtube.com/embed/5TlH2VzXwKQ",
        "Band Chest Press (Superset 1)": "https://www.youtube.com/embed/lB6QQJ7a7qE"
      };

      // ---------- FULL PROGRAM ----------
      const program = {
        foundation: {
          name: "Foundation",
          A: [
            { name: "Goblet Squat", sets: "3", reps: "10–12" },
            { name: "Dumbbell Floor Press", sets: "3", reps: "10–12" },
            { name: "Resistance Band Row", sets: "3", reps: "10–12" },
            { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10–12" },
            { name: "Dumbbell Shoulder Press", sets: "3", reps: "10–12" },
            { name: "Plank", sets: "3", reps: "20–30 sec" }
          ],
          B: [
            { name: "Reverse Lunges", sets: "3", reps: "10–12 / leg" },
            { name: "Push-ups", sets: "3", reps: "10–12" },
            { name: "One-Arm Dumbbell Row", sets: "3", reps: "10–12 / side" },
            { name: "Glute Bridge", sets: "3", reps: "10–12" },
            { name: "Dumbbell Biceps Curl", sets: "3", reps: "10–12" },
            { name: "Dead Bug", sets: "3", reps: "10 / side" }
          ],
          C: [
            { name: "Dumbbell Deadlift", sets: "3", reps: "10–12" },
            { name: "Resistance Band Chest Press", sets: "3", reps: "10–12" },
            { name: "Band Lat Pulldown", sets: "3", reps: "10–12" },
            { name: "Dumbbell Lateral Raise", sets: "3", reps: "10–12" },
            { name: "Triceps Kickbacks", sets: "3", reps: "10–12" },
            { name: "Russian Twist", sets: "3", reps: "20" }
          ]
        },
        strength: {
          name: "Strength",
          A: [
            { name: "Goblet Squat", sets: "4", reps: "8" },
            { name: "Dumbbell Press", sets: "4", reps: "8" },
            { name: "Band Row", sets: "4", reps: "10" },
            { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10" },
            { name: "Shoulder Press", sets: "3", reps: "8" },
            { name: "Plank", sets: "3", reps: "30 sec" }
          ],
          B: [
            { name: "Reverse Lunges", sets: "4", reps: "8 / leg" },
            { name: "Push-ups", sets: "4", reps: "10" },
            { name: "One-Arm Row", sets: "3", reps: "10 / side" },
            { name: "Glute Bridge", sets: "3", reps: "12" },
            { name: "Dumbbell Curl", sets: "3", reps: "10" },
            { name: "Dead Bug", sets: "3", reps: "12 / side" }
          ],
          C: [
            { name: "Dumbbell Deadlift", sets: "4", reps: "8" },
            { name: "Band Chest Press", sets: "3", reps: "10" },
            { name: "Band Lat Pulldown", sets: "3", reps: "10" },
            { name: "Lateral Raise", sets: "3", reps: "12" },
            { name: "Triceps Kickback", sets: "3", reps: "10" },
            { name: "Russian Twist", sets: "3", reps: "20" }
          ]
        },
        hypertrophy: {
          name: "Hypertrophy",
          A: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Goblet Squat (Superset 1)", sets: "4", reps: "8" },
                { name: "Dumbbell Press (Superset 1)", sets: "4", reps: "8" }
              ]},
              { label: "Superset 2", exercises: [
                { name: "Band Row (Superset 2)", sets: "4", reps: "10" },
                { name: "Dumbbell Romanian Deadlift (Superset 2)", sets: "4", reps: "10" }
              ]}
            ],
            singles: [
              { name: "Shoulder Press", sets: "3", reps: "10" },
              { name: "Plank", sets: "3", reps: "40 sec" }
            ]
          },
          B: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Reverse Lunges (Superset 1)", sets: "4", reps: "8 / leg" },
                { name: "Push-ups (Superset 1)", sets: "4", reps: "12" }
              ]}
            ],
            singles: [
              { name: "One-Arm Row", sets: "4", reps: "10 / side" },
              { name: "Glute Bridge", sets: "4", reps: "12" },
              { name: "Dumbbell Curl", sets: "3", reps: "10" }
            ]
          },
          C: {
            supersets: [
              { label: "Superset 1", exercises: [
                { name: "Dumbbell Deadlift (Superset 1)", sets: "4", reps: "8" },
                { name: "Band Chest Press (Superset 1)", sets: "4", reps: "10" }
              ]}
            ],
            singles: [
              { name: "Band Lat Pulldown", sets: "4", reps: "10" },
              { name: "Lateral Raise", sets: "3", reps: "12" },
              { name: "Triceps Kickback", sets: "3", reps: "10" },
              { name: "Russian Twist", sets: "3", reps: "25" }
            ]
          }
        }
      };

      // UI elements
      const phaseTabs = document.querySelectorAll('.phase-tab');
      const dayBtns = document.querySelectorAll('.day-btn');
      const repeatBtn = document.getElementById('repeatBtn');
      const exerciseListEl = document.getElementById('exerciseList');
      const videoPlaceholder = document.getElementById('mainVideoPlaceholder');
      const videoEmbed = document.getElementById('videoEmbedContainer');
      const videoIframe = document.getElementById('videoIframe');
      const completedBtn = document.getElementById('completedBtn');
      const lastCompletedSpan = document.getElementById('lastCompletedDate');
      const themeToggle = document.getElementById('themeToggle');
      const darkIcon = document.getElementById('darkIcon');
      const lightIcon = document.getElementById('lightIcon');

      // Theme toggle
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        darkIcon.style.display = isLight ? 'none' : 'inline';
        lightIcon.style.display = isLight ? 'inline' : 'none';
      });

      let currentPhase = 'foundation';
      let currentDay = 'A';
      let clickedExercises = new Set();

      function updateLastCompletedDisplay() {
        const key = `lastCompleted_${currentPhase}_${currentDay}`;
        const saved = localStorage.getItem(key);
        lastCompletedSpan.textContent = saved || 'Not yet completed';
      }

      function triggerCelebration() {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCB77', '#9B59B6'] });
        setTimeout(() => {
          confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FF8C42', '#FFE66D', '#4ECDC4'] });
          confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FF8C42', '#FFE66D', '#4ECDC4'] });
        }, 150);
        
        const now = new Date();
        const formatted = now.toLocaleDateString('en-US', { 
          weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        localStorage.setItem(`lastCompleted_${currentPhase}_${currentDay}`, formatted);
        updateLastCompletedDisplay();
      }

      function formatSetsReps(ex) {
        return `${ex.sets} sets x ${ex.reps}`;
      }

      function renderExercises() {
        const phaseData = program[currentPhase];
        const dayData = phaseData[currentDay];
        let htmlStr = '';

        if (currentPhase !== 'hypertrophy') {
          dayData.forEach((ex, idx) => {
            const rowId = `row-${currentPhase}-${currentDay}-${idx}`;
            htmlStr += `
              <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}">
                <div class="exercise-info">
                  <span class="exercise-name">${ex.name}</span>
                  <span class="exercise-sets">${formatSetsReps(ex)}</span>
                </div>
                <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}"><i class="fas fa-play"></i></button>
              </div>
            `;
          });
        } else {
          if (dayData.supersets) {
            dayData.supersets.forEach((group, gIdx) => {
              group.exercises.forEach((ex, eIdx) => {
                const rowId = `row-${currentPhase}-${currentDay}-hyper-${gIdx}-${eIdx}`;
                htmlStr += `
                  <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}">
                    <div class="exercise-info">
                      <span class="exercise-name">${ex.name}</span>
                      <span class="exercise-sets">${formatSetsReps(ex)}</span>
                    </div>
                    <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}"><i class="fas fa-play"></i></button>
                  </div>
                `;
              });
            });
          }
          if (dayData.singles) {
            dayData.singles.forEach((ex, idx) => {
              const rowId = `row-${currentPhase}-${currentDay}-single-${idx}`;
              htmlStr += `
                <div class="exercise-row" data-row-id="${rowId}" data-exercise-name="${ex.name}">
                  <div class="exercise-info">
                    <span class="exercise-name">${ex.name}</span>
                    <span class="exercise-sets">${formatSetsReps(ex)}</span>
                  </div>
                  <button class="play-button" data-exercise="${ex.name}" data-row="${rowId}"><i class="fas fa-play"></i></button>
                </div>
              `;
            });
          }
        }

        exerciseListEl.innerHTML = htmlStr;
        clickedExercises.clear();
        updateLastCompletedDisplay();

        document.querySelectorAll('.play-button').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const exName = btn.dataset.exercise;
            const rowId = btn.dataset.row;
            let url = exerciseVideos[exName];
            if (!url && exName.includes('(')) {
              const baseName = exName.split('(')[0].trim();
              url = exerciseVideos[baseName];
            }
            const row = document.querySelector(`[data-row-id="${rowId}"]`);
            if (row) { row.classList.add('clicked'); clickedExercises.add(rowId); }
            if (url) {
              videoPlaceholder.style.display = 'none';
              videoEmbed.style.display = 'block';
              videoIframe.src = url;
            } else { alert(`No video for ${exName}`); }
          });
        });
      }

      // Event listeners
      phaseTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          phaseTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentPhase = tab.dataset.phase;
          currentDay = 'A';
          dayBtns.forEach(b => b.classList.remove('active'));
          dayBtns[0].classList.add('active');
          renderExercises();
        });
      });

      dayBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          dayBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDay = btn.dataset.day;
          renderExercises();
        });
      });

      repeatBtn.addEventListener('click', () => {
        currentDay = 'A';
        dayBtns.forEach(b => b.classList.remove('active'));
        dayBtns[0].classList.add('active');
        renderExercises();
        videoPlaceholder.style.display = 'flex';
        videoEmbed.style.display = 'none';
        videoIframe.src = '';
      });

      completedBtn.addEventListener('click', () => {
        const total = document.querySelectorAll('.exercise-row').length;
        if (clickedExercises.size === total && total > 0) {
          triggerCelebration();
          videoPlaceholder.style.display = 'flex';
          videoEmbed.style.display = 'none';
          videoIframe.src = '';
          const days = ['A', 'B', 'C'];
          let dIdx = days.indexOf(currentDay);
          let nextDay = (dIdx + 1) % days.length;
          if (nextDay === 0) {
            const phases = ['foundation', 'strength', 'hypertrophy'];
            let pIdx = phases.indexOf(currentPhase);
            let nextPhase = (pIdx + 1) % phases.length;
            phaseTabs.forEach(t => t.classList.remove('active'));
            phaseTabs[nextPhase].classList.add('active');
            currentPhase = phases[nextPhase];
          }
          dayBtns.forEach(b => b.classList.remove('active'));
          dayBtns[nextDay].classList.add('active');
          currentDay = days[nextDay];
          renderExercises();
        } else {
          videoPlaceholder.style.display = 'flex';
          videoEmbed.style.display = 'none';
          videoIframe.src = '';
          alert(`Click play on each exercise (${clickedExercises.size}/${total})`);
        }
      });

      videoPlaceholder.addEventListener('click', () => {
        videoPlaceholder.style.display = 'flex';
        videoEmbed.style.display = 'none';
        videoIframe.src = '';
      });

      renderExercises();
    })();
  </script>
</body>
</html>
