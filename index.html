<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>J&G Home-Fit</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=SF+Pro+Text:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.4.0/tsparticles.confetti.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #151719;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      color: #e4e6eb;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* Container */
    .app-container {
      max-width: 1024px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 32px;
      background: #151719;
      border-radius: 48px;
    }

    /* header */
    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 0.5px solid rgba(228, 230, 235, 0.2);
    }

    .logo-area h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e4e6eb;
    }

    .logo-area p {
      font-size: 0.8rem;
      color: #e4e6ebaa;
      margin-top: 4px;
      font-weight: 400;
    }

    .day-indicator {
      background: rgba(245, 245, 220, 0.08);
      border: 0.5px solid rgba(245, 245, 220, 0.2);
      border-radius: 100px;
      padding: 8px 24px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #e4e6ebdd;
    }

    /* VIDEO CARD — FIXED: white background for black spaces (letterbox/pillarbox) */
    .video-card {
      background: #0f1115;
      border-radius: 28px;
      overflow: hidden;
      margin-bottom: 28px;
      transition: all 0.3s ease;
      border: 1px solid rgba(228, 230, 235, 0.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* container with FIXED aspect ratio, white-background wrapper to hide black bars */
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #ffffff;  /* CRITICAL: WHITE BACKGROUND — hides any black empty spaces when video/image has transparency or edges */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    /* UNIFIED MEDIA PLAYER: object-fit contain ensures full visibility but adds letterbox.
       The white background behind makes those side/top bars blend seamlessly with white (since images/videos often have white bg) */
    .media-player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;    /* shows entire media without cropping, black bars replaced by white container bg */
      background: transparent; /* actual media background is transparent, container provides white */
      display: block;
    }

    /* Video element specific — container white background will fill gaps perfectly */
    video.media-player {
      object-fit: contain;
      background: transparent;
    }

    /* Image/GIF: same contain logic — white bg from parent hides any black gaps */
    img.media-player {
      object-fit: contain;
      background: transparent;
    }

    /* placeholder styling — now with semi-transparent dark overlay but container bg white? we keep placeholder dark but while loading white bg is visible */
    .video-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f1115;   /* dark placeholder matches dark theme, but as soon as video loads it's replaced */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #e4e6ebcc;
      z-index: 2;
      cursor: pointer;
      backdrop-filter: blur(2px);
    }

    /* When video/image becomes visible, placeholder hides -> reveals white container background around media */
    .placeholder-icon {
      width: 70px;
      height: 70px;
      background: rgba(245, 245, 220, 0.06);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #e4e6ebcc;
      border: 0.5px solid rgba(245, 245, 220, 0.2);
      transition: all 0.3s;
    }

    .video-placeholder:hover .placeholder-icon {
      transform: scale(1.05);
      background: rgba(245, 245, 220, 0.1);
      border-color: rgba(245, 245, 220, 0.4);
      color: #e4e6eb;
    }

    .video-placeholder span {
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: -0.2px;
    }

    .hidden {
      display: none !important;
    }

    /* phase tabs */
    .phase-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      background: #1e2126;
      padding: 4px;
      border-radius: 100px;
      width: fit-content;
    }

    .phase-btn {
      background: transparent;
      border: none;
      padding: 8px 24px;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #e4e6ebcc;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .phase-btn.active {
      background: rgba(245, 245, 220, 0.15);
      color: #e4e6eb;
      font-weight: 600;
    }

    .phase-btn:hover:not(.active) {
      color: #e4e6eb;
      background: rgba(245, 245, 220, 0.08);
    }

    /* day selector */
    .day-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      background: #1e2126;
      padding: 4px;
      border-radius: 100px;
      width: fit-content;
    }

    .day-btn {
      background: transparent;
      border: none;
      padding: 8px 32px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #e4e6ebaa;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .day-btn.active {
      background: rgba(245, 245, 220, 0.15);
      color: #e4e6eb;
    }

    .day-btn:hover:not(.active) {
      color: #e4e6eb;
      background: rgba(245, 245, 220, 0.08);
    }

    /* exercise grid */
    .exercises-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .exercise-item {
      background: #1e2126;
      border-radius: 18px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
      border: 1px solid rgba(228, 230, 235, 0.08);
    }

    .exercise-item:hover {
      background: #282b31;
      transform: translateX(4px);
      border-color: rgba(245, 245, 220, 0.2);
    }

    .exercise-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .exercise-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #e4e6eb;
    }

    .exercise-details {
      background: rgba(228, 230, 235, 0.08);
      border-radius: 40px;
      padding: 4px 14px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #e4e6ebcc;
    }

    .play-action {
      background: rgba(245, 245, 220, 0.06);
      border: 0.5px solid rgba(245, 245, 220, 0.15);
      width: 44px;
      height: 44px;
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e4e6ebcc;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .play-action:hover {
      background: rgba(245, 245, 220, 0.12);
      transform: scale(0.96);
      border-color: rgba(245, 245, 220, 0.35);
      color: #e4e6eb;
    }

    .exercise-item.completed .play-action {
      background: rgba(245, 245, 220, 0.2);
      color: #e4e6eb;
      border-color: rgba(245, 245, 220, 0.35);
    }

    /* progress section */
    .progress-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin: 20px 0 24px;
      padding: 16px 0;
      border-top: 0.5px solid rgba(228, 230, 235, 0.15);
      border-bottom: 0.5px solid rgba(228, 230, 235, 0.15);
    }

    .progress-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e2126;
      padding: 6px 20px;
      border-radius: 100px;
    }

    .progress-stats i {
      color: #e4e6ebcc;
      font-size: 1rem;
    }

    .progress-stats span {
      font-weight: 700;
      color: #e4e6eb;
      font-size: 1rem;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-reset {
      background: rgba(228, 230, 235, 0.06);
      border: 0.5px solid rgba(228, 230, 235, 0.15);
      width: 48px;
      height: 48px;
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e4e6eb;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset:hover {
      background: rgba(245, 245, 220, 0.08);
      transform: rotate(-15deg);
      border-color: rgba(245, 245, 220, 0.25);
      color: #e4e6eb;
    }

    .btn-complete {
      background: rgba(245, 245, 220, 0.12);
      border: 0.5px solid rgba(245, 245, 220, 0.2);
      padding: 0 32px;
      height: 48px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #e4e6eb;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn-complete:hover {
      background: rgba(245, 245, 220, 0.18);
      transform: translateY(-1px);
    }

    /* history card */
    .history-card {
      background: #1e2126;
      border-radius: 18px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(228, 230, 235, 0.08);
    }

    .history-card i {
      color: #e4e6ebcc;
      font-size: 1rem;
    }

    .history-card span {
      font-weight: 600;
      color: #e4e6ebcc;
      background: rgba(245, 245, 220, 0.08);
      padding: 3px 10px;
      border-radius: 40px;
      margin-left: 6px;
    }

    /* toast messages */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2126;
      color: #e4e6eb;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.85rem;
      z-index: 1000;
      animation: fadeUp 0.3s ease;
      border: 0.5px solid rgba(245, 245, 220, 0.2);
      backdrop-filter: blur(8px);
    }

    .toast-message.error {
      background: rgba(245, 245, 220, 0.1);
      color: #e4e6eb;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #151719;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(245, 245, 220, 0.3);
      border-radius: 3px;
    }

    @media (max-width: 680px) {
      body { padding: 16px; }
      .app-container { padding: 20px; max-width: 100%; }
      .day-selector { width: 100%; justify-content: center; }
      .day-btn { padding: 6px 20px; font-size: 0.8rem; }
      .phase-tabs { width: 100%; justify-content: center; }
      .phase-btn { padding: 6px 18px; font-size: 0.75rem; }
      .exercise-info { gap: 10px; }
      .exercise-name { font-size: 0.85rem; }
      .progress-section { flex-direction: column; align-items: stretch; }
      .action-buttons { justify-content: center; }
      .main-header { flex-direction: column; align-items: flex-start; }
      .video-container { aspect-ratio: 16 / 9; background: #ffffff; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="main-header">
    <div class="logo-area">
      <h1>
        <i class="fas fa-dumbbell" style="color: #e4e6ebcc; margin-right: 8px;"></i>
        J&G Home-Fit
      </h1>
      <p>home fitness · full body program · 3 days / week</p>
    </div>
    <div class="day-indicator" id="currentDayBadge">Day A</div>
  </div>

  <!-- FIXED VIDEO CARD: white background hides black letterbox/pillarbox spaces -->
  <div class="video-card">
    <div class="video-container" id="videoContainer">
      <div class="video-placeholder" id="videoPlaceholder">
        <div class="placeholder-icon"><i class="fas fa-play-circle"></i></div>
        <span>Select an exercise</span>
      </div>
      <video id="videoPlayer" class="media-player hidden" controls autoplay loop muted playsinline></video>
      <img id="gifPlayer" class="media-player hidden" alt="exercise demo">
    </div>
  </div>

  <div class="phase-tabs" id="phaseTabs">
    <button class="phase-btn active" data-phase="foundation">Foundation</button>
    <button class="phase-btn" data-phase="strength">Strength</button>
    <button class="phase-btn" data-phase="hypertrophy">Hypertrophy</button>
  </div>

  <div class="day-selector" id="daySelector">
    <button class="day-btn active" data-day="A">Day A</button>
    <button class="day-btn" data-day="B">Day B</button>
    <button class="day-btn" data-day="C">Day C</button>
  </div>

  <div class="exercises-grid" id="exercisesList"></div>

  <div class="progress-section">
    <div class="progress-stats">
      <i class="fas fa-check-circle"></i>
      <span id="progressCount">0</span> / <span id="totalCount">0</span> exercises viewed
    </div>
    <div class="action-buttons">
      <div class="btn-reset" id="resetBtn" title="Reset current day">
        <i class="fas fa-arrow-rotate-left"></i>
      </div>
      <button class="btn-complete" id="completeDayBtn">
        <i class="fas fa-check"></i> Complete Day
      </button>
    </div>
  </div>

  <div class="history-card">
    <i class="fas fa-calendar-week"></i>
    <div>Last completed: <span id="lastSessionSpan">—</span></div>
  </div>
</div>

<script>
  const programData = {
    foundation: {
      A: [
        { name: "Goblet Squat", sets: "3", reps: "10–12" },
        { name: "Dumbbell Floor Press", sets: "3", reps: "10–12" },
        { name: "Resistance Band Row", sets: "3", reps: "10–12" },
        { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10–12" },
        { name: "Dumbbell Shoulder Press", sets: "3", reps: "10–12" },
        { name: "Plank", sets: "3", reps: "20–30 sec" }
      ],
      B: [
        { name: "Reverse Lunges", sets: "3", reps: "10–12 / leg" },
        { name: "Push-ups", sets: "3", reps: "10–12" },
        { name: "One-Arm Dumbbell Row", sets: "3", reps: "10–12 / side" },
        { name: "Glute Bridge", sets: "3", reps: "10–12" },
        { name: "Dumbbell Biceps Curl", sets: "3", reps: "10–12" },
        { name: "Dead Bug", sets: "3", reps: "10 / side" }
      ],
      C: [
        { name: "Dumbbell Deadlift", sets: "3", reps: "10–12" },
        { name: "Resistance Band Chest Press", sets: "3", reps: "10–12" },
        { name: "Band Lat Pulldown", sets: "3", reps: "10–12" },
        { name: "Dumbbell Lateral Raise", sets: "3", reps: "10–12" },
        { name: "Triceps Kickbacks", sets: "3", reps: "10–12" },
        { name: "Russian Twist", sets: "3", reps: "20" }
      ]
    },
    strength: {
      A: [
        { name: "Goblet Squat", sets: "4", reps: "8" },
        { name: "Dumbbell Press", sets: "4", reps: "8" },
        { name: "Band Row", sets: "4", reps: "10" },
        { name: "Dumbbell Romanian Deadlift", sets: "3", reps: "10" },
        { name: "Shoulder Press", sets: "3", reps: "8" },
        { name: "Plank", sets: "3", reps: "30 sec" }
      ],
      B: [
        { name: "Reverse Lunges", sets: "4", reps: "8 / leg" },
        { name: "Push-ups", sets: "4", reps: "10" },
        { name: "One-Arm Row", sets: "3", reps: "10 / side" },
        { name: "Glute Bridge", sets: "3", reps: "12" },
        { name: "Dumbbell Curl", sets: "3", reps: "10" },
        { name: "Dead Bug", sets: "3", reps: "12 / side" }
      ],
      C: [
        { name: "Dumbbell Deadlift", sets: "4", reps: "8" },
        { name: "Band Chest Press", sets: "3", reps: "10" },
        { name: "Band Lat Pulldown", sets: "3", reps: "10" },
        { name: "Lateral Raise", sets: "3", reps: "12" },
        { name: "Triceps Kickback", sets: "3", reps: "10" },
        { name: "Russian Twist", sets: "3", reps: "20" }
      ]
    },
    hypertrophy: {
      A: [
        { name: "Goblet Squat (Superset 1)", sets: "4", reps: "8" },
        { name: "Dumbbell Press (Superset 1)", sets: "4", reps: "8" },
        { name: "Band Row (Superset 2)", sets: "4", reps: "10" },
        { name: "Dumbbell Romanian Deadlift (Superset 2)", sets: "4", reps: "10" },
        { name: "Shoulder Press", sets: "3", reps: "10" },
        { name: "Plank", sets: "3", reps: "40 sec" }
      ],
      B: [
        { name: "Reverse Lunges (Superset 1)", sets: "4", reps: "8 / leg" },
        { name: "Push-ups (Superset 1)", sets: "4", reps: "12" },
        { name: "One-Arm Row", sets: "4", reps: "10 / side" },
        { name: "Glute Bridge", sets: "4", reps: "12" },
        { name: "Dumbbell Curl", sets: "3", reps: "10" }
      ],
      C: [
        { name: "Dumbbell Deadlift (Superset 1)", sets: "4", reps: "8" },
        { name: "Band Chest Press (Superset 1)", sets: "4", reps: "10" },
        { name: "Band Lat Pulldown", sets: "4", reps: "10" },
        { name: "Lateral Raise", sets: "3", reps: "12" },
        { name: "Triceps Kickback", sets: "3", reps: "10" },
        { name: "Russian Twist", sets: "3", reps: "25" }
      ]
    }
  };

  function getMediaPath(exerciseName) {
    const clean = exerciseName.replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
    return `images/${clean}`;
  }

  class MediaManager {
    constructor(videoEl, imgEl, placeholder, container) {
      this.video = videoEl;
      this.img = imgEl;
      this.placeholder = placeholder;
      this.container = container; // videoContainer (white background)
    }
    
    async load(exerciseName) {
      // full reset before loading new media
      this.video.pause();
      this.video.removeAttribute('src');
      this.video.load();
      this.img.removeAttribute('src');
      this.video.classList.add('hidden');
      this.img.classList.add('hidden');
      this.placeholder.classList.remove('hidden');
      
      const base = getMediaPath(exerciseName);
      const formats = [
        { ext: 'mp4', type: 'video' },
        { ext: 'webm', type: 'video' },
        { ext: 'gif', type: 'img' }
      ];
      
      for (let f of formats) {
        const url = `${base}.${f.ext}`;
        const exists = await this.checkExists(url, f.type);
        if (exists) {
          if (f.type === 'img') {
            this.img.onload = () => {
              this.placeholder.classList.add('hidden');
              this.img.classList.remove('hidden');
            };
            this.img.onerror = () => {};
            this.img.src = url;
          } else {
            this.video.oncanplaythrough = () => {
              this.placeholder.classList.add('hidden');
              this.video.classList.remove('hidden');
              this.video.play().catch(e => console.log("autoplay", e));
            };
            this.video.onerror = () => {};
            this.video.src = url;
            this.video.load();
          }
          return true;
        }
      }
      const msgSpan = this.placeholder.querySelector('span');
      if (msgSpan) {
        const originalText = msgSpan.innerText;
        msgSpan.innerText = `⚠️ ${exerciseName} media missing`;
        setTimeout(() => { if(msgSpan) msgSpan.innerText = originalText; }, 1800);
      }
      return false;
    }
    
    checkExists(url, type) {
      return new Promise((resolve) => {
        if (type === 'img') {
          const testImg = new Image();
          testImg.onload = () => resolve(true);
          testImg.onerror = () => resolve(false);
          testImg.src = url;
        } else {
          const testVideo = document.createElement('video');
          testVideo.onloadedmetadata = () => resolve(true);
          testVideo.onerror = () => resolve(false);
          testVideo.src = url;
          testVideo.load();
          setTimeout(() => {
            if (!testVideo.duration && testVideo.readyState === 0) resolve(false);
          }, 300);
        }
      });
    }
    
    reset() {
      this.video.pause();
      this.video.removeAttribute('src');
      this.video.load();
      this.img.removeAttribute('src');
      this.video.classList.add('hidden');
      this.img.classList.add('hidden');
      this.placeholder.classList.remove('hidden');
      const span = this.placeholder.querySelector('span');
      if (span) span.innerText = 'Select an exercise — white background hides empty spaces';
    }
  }

  let currentPhase = 'foundation';
  let currentDay = 'A';
  let viewedExercises = new Set();

  const exercisesContainer = document.getElementById('exercisesList');
  const phaseBtns = document.querySelectorAll('.phase-btn');
  const dayBtns = document.querySelectorAll('.day-btn');
  const resetBtn = document.getElementById('resetBtn');
  const completeBtn = document.getElementById('completeDayBtn');
  const currentDayBadge = document.getElementById('currentDayBadge');
  const progressCountSpan = document.getElementById('progressCount');
  const totalCountSpan = document.getElementById('totalCount');
  const lastSessionSpan = document.getElementById('lastSessionSpan');

  const videoPlayer = document.getElementById('videoPlayer');
  const gifPlayer = document.getElementById('gifPlayer');
  const placeholderDiv = document.getElementById('videoPlaceholder');
  const videoContainerDiv = document.getElementById('videoContainer');
  const mediaManager = new MediaManager(videoPlayer, gifPlayer, placeholderDiv, videoContainerDiv);

  function updateLastDisplay() {
    const key = `lastCompleted_${currentPhase}_${currentDay}`;
    const saved = localStorage.getItem(key);
    lastSessionSpan.innerText = saved || '—';
  }

  function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = `toast-message ${isError ? 'error' : ''}`;
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2200);
  }

  function triggerCelebration() {
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.5 }, colors: ['#e4e6eb', '#e4e6ebcc', '#ffffff'] });
    setTimeout(() => {
      confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#e4e6ebcc'] });
      confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#e4e6eb'] });
    }, 120);
    const now = new Date();
    const formatted = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    localStorage.setItem(`lastCompleted_${currentPhase}_${currentDay}`, formatted);
    updateLastDisplay();
  }

  function updateProgressUI() {
    const total = document.querySelectorAll('.exercise-item').length;
    const viewed = viewedExercises.size;
    progressCountSpan.innerText = viewed;
    totalCountSpan.innerText = total;
  }

  async function renderExercises() {
    const dayExercises = programData[currentPhase]?.[currentDay];
    if (!dayExercises) return;
    let html = '';
    dayExercises.forEach((ex, idx) => {
      const rowId = `${currentPhase}_${currentDay}_${idx}_${ex.name.replace(/\s/g, '')}`;
      const isCompleted = viewedExercises.has(rowId);
      html += `
        <div class="exercise-item ${isCompleted ? 'completed' : ''}" data-row-id="${rowId}" data-ex-name="${ex.name}">
          <div class="exercise-info">
            <span class="exercise-name">${escapeHtml(ex.name)}</span>
            <span class="exercise-details">${ex.sets} sets · ${ex.reps}</span>
          </div>
          <div class="play-action" data-exercise="${ex.name}" data-row="${rowId}">
            <i class="fas fa-play"></i>
          </div>
        </div>
      `;
    });
    exercisesContainer.innerHTML = html;
    updateProgressUI();
    currentDayBadge.innerText = `Day ${currentDay}`;

    document.querySelectorAll('.play-action').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const exName = btn.dataset.exercise;
        const rowId = btn.dataset.row;
        const parentItem = document.querySelector(`[data-row-id="${rowId}"]`);
        await mediaManager.load(exName);
        if (!viewedExercises.has(rowId)) {
          viewedExercises.add(rowId);
          if (parentItem) parentItem.classList.add('completed');
          updateProgressUI();
        }
      });
    });
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  async function resetCurrentDay() {
    viewedExercises.clear();
    await renderExercises();
    mediaManager.reset();
    showToast(`Reset ${currentPhase} · Day ${currentDay}`);
  }

  async function completeDay() {
    const totalItems = document.querySelectorAll('.exercise-item').length;
    if (viewedExercises.size === totalItems && totalItems > 0) {
      triggerCelebration();
      mediaManager.reset();
      const days = ['A', 'B', 'C'];
      let dayIndex = days.indexOf(currentDay);
      let nextDay = days[(dayIndex + 1) % 3];
      let nextPhase = currentPhase;
      if (nextDay === 'A') {
        const phases = ['foundation', 'strength', 'hypertrophy'];
        let phaseIdx = phases.indexOf(currentPhase);
        nextPhase = phases[(phaseIdx + 1) % 3];
        phaseBtns.forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.phase === nextPhase) btn.classList.add('active');
        });
        currentPhase = nextPhase;
      }
      currentDay = nextDay;
      dayBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.day === currentDay) btn.classList.add('active');
      });
      viewedExercises.clear();
      await renderExercises();
      showToast(`✨ Day completed! Moved to ${nextPhase} · Day ${currentDay}`);
    } else {
      const remaining = totalItems - viewedExercises.size;
      showToast(`Complete ${remaining}  demo(s) exercises`, true);
      mediaManager.reset();
    }
  }

  phaseBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      phaseBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPhase = btn.dataset.phase;
      currentDay = 'A';
      dayBtns.forEach(d => {
        d.classList.remove('active');
        if (d.dataset.day === 'A') d.classList.add('active');
      });
      viewedExercises.clear();
      await renderExercises();
      mediaManager.reset();
    });
  });

  dayBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      dayBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDay = btn.dataset.day;
      viewedExercises.clear();
      await renderExercises();
      mediaManager.reset();
    });
  });

  resetBtn.addEventListener('click', resetCurrentDay);
  completeBtn.addEventListener('click', completeDay);
  placeholderDiv.addEventListener('click', () => mediaManager.reset());

  renderExercises();
  updateLastDisplay();
</script>
</body>
</html>
